<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Music Session Counter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #050026, #2b005c);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .box {
      width: 420px;
      padding: 35px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(18px);
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 260px;
      padding: 12px;
      font-size: 24px;
      text-align: center;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-bottom: 20px;
    }

    #presetName {
      font-size: 32px;
      font-weight: bold;
      margin-top: 15px;
    }

    #qty {
      font-size: 120px;
      font-weight: bold;
      margin-top: 10px;
      line-height: 1;
    }

    .label {
      font-size: 20px;
      margin-top: 10px;
      opacity: 0.9;
    }

    .hint {
      font-size: 14px;
      margin-top: 20px;
      opacity: 0.8;
      line-height: 1.5;
    }

    a {
      display: inline-block;
      margin-top: 25px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Music Session Counter</h1>

    <input
      type="text"
      id="numberInput"
      placeholder="Example: 11111"
      maxlength="100"
      inputmode="numeric"
      oninput="updateCounter()"
    />

    <div id="presetName">-</div>

    <div id="qty">0</div>

    <div class="label">Quantity</div>

    <div class="hint">
      0 = Cyan<br>
      1 = Red<br>
      2 = Orange<br>
      3 = Yellow<br>
      4 = Green<br>
      5 = Blue<br>
      6 = Purple<br>
      7 = Pink<br>
      8 = Brown<br>
      9 = Gray
    </div>

    <a href="index.html">← Back to Home</a>
  </div>

  <script>
    function updateCounter() {
      const input = document.getElementById("numberInput");

      input.value = input.value.replace(/[^0-9]/g, "");

      const text = input.value;
      const qty = text.length;

      const presetName = document.getElementById("presetName");
      const qtyDisplay = document.getElementById("qty");

      qtyDisplay.innerHTML = qty;

      if (qty === 0) {
        presetName.innerHTML = "-";
        presetName.style.color = "white";
        qtyDisplay.style.color = "white";
        return;
      }

      const digit = text[0];

      const presets = {
        "0": { name: "Cyan", color: "cyan" },
        "1": { name: "Red", color: "red" },
        "2": { name: "Orange", color: "orange" },
        "3": { name: "Yellow", color: "yellow" },
        "4": { name: "Green", color: "lime" },
        "5": { name: "Blue", color: "dodgerblue" },
        "6": { name: "Purple", color: "purple" },
        "7": { name: "Pink", color: "hotpink" },
        "8": { name: "Brown", color: "saddlebrown" },
        "9": { name: "Gray", color: "gray" }
      };

      presetName.innerHTML = presets[digit].name;
      presetName.style.color = presets[digit].color;
      qtyDisplay.style.color = presets[digit].color;
    }
  </script>

</body>
</html>
