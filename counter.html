<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #050026, #2b005c);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .box {
      width: 700px;
      padding: 30px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .usage {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
      color: white;
      font-weight: bold;
    }

    th, td {
      border: 2px solid white;
      padding: 12px;
      text-align: center;
    }

    th {
      background: black;
    }

    .red { background: red; }
    .orange { background: orange; color: black; }
    .yellow { background: yellow; color: black; }
    .green { background: lime; color: black; }
    .blue { background: blue; }
    .purple { background: purple; }
    .pink { background: pink; color: black; }
    .brown { background: #8b4a00; }
    .cream { background: #e5c18c; color: black; }
    .cyan { background: cyan; color: black; }

    .active {
      outline: 5px solid white;
      filter: brightness(1.25);
      transform: scale(1.02);
    }

    button {
      font-size: 22px;
      font-weight: bold;
      padding: 12px 25px;
      margin: 8px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .minus {
      background: #ff4d4d;
      color: white;
    }

    .plus {
      background: #32cd32;
      color: white;
    }

    .reset {
      background: #00cfff;
      color: white;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Music Session Counter</h1>

    <div class="usage">
      Usage: <span id="usageNumber">1</span> / 2
    </div>

    <table>
      <tr>
        <th>No</th>
        <th>Preset Name</th>
      </tr>

      <tr id="row1" class="red">
        <td>1</td>
        <td>CountryPopDuo</td>
      </tr>

      <tr id="row2" class="orange">
        <td>2</td>
        <td>ChartPianoShuffle</td>
      </tr>

      <tr id="row3" class="yellow">
        <td>3</td>
        <td>60sVintageRumba</td>
      </tr>

      <tr id="row4" class="green">
        <td>4</td>
        <td>90sHardRockBallad</td>
      </tr>

      <tr id="row5" class="blue">
        <td>5</td>
        <td>60sClassicSoftRock</td>
      </tr>

      <tr id="row6" class="purple">
        <td>6</td>
        <td>PopWaltz</td>
      </tr>

      <tr id="row7" class="pink">
        <td>7</td>
        <td>EpicDivaBallad</td>
      </tr>

      <tr id="row8" class="brown">
        <td>8</td>
        <td>BoyBandPop</td>
      </tr>

      <tr id="row9" class="cream">
        <td>9</td>
        <td>OrchRockBallad1</td>
      </tr>

      <tr id="row10" class="cyan">
        <td>10</td>
        <td>70sGlamPiano</td>
      </tr>
    </table>

    <button class="minus" onclick="minusOne()">-1</button>
    <button class="plus" onclick="plusOne()">+1</button>
    <button class="reset" onclick="resetCounter()">Reset</button>

    <br>
    <a href="index.html">← Back to Home</a>
  </div>

  <script>
    let counter = 1;

    function updateDisplay() {
      document.getElementById("usageNumber").innerText = counter;

      for (let i = 1; i <= 10; i++) {
        document.getElementById("row" + i).classList.remove("active");
      }

      document.getElementById("row" + counter).classList.add("active");
    }

    function plusOne() {
      counter++;

      if (counter > 10) {
        counter = 1;
      }

      updateDisplay();
    }

    function minusOne() {
      counter--;

      if (counter < 1) {
        counter = 10;
      }

      updateDisplay();
    }

    function resetCounter() {
      counter = 1;
      updateDisplay();
    }

    updateDisplay();
  </script>

</body>
</html>
